{% extends "base.html" %}

{% block contenido %}

<h2>Mapa de suministro</h2>

<input type="text" id="direccion" placeholder="Escribe una dirección">
<button onclick="buscar()">Buscar</button>

<div id="map" style="height:500px; margin-top:15px;"></div>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;
let marcador;

// Inicializar mapa
map = L.map('map').setView([25.809, -100.598], 13);

// Cargar tiles de OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

function buscar() {
    const direccion = document.getElementById("direccion").value;

    if (!direccion) {
        alert("Escribe una dirección");
        return;
    }

    fetch(`/api/geocode?direccion=${encodeURIComponent(direccion)}`)
        .then(res => {
            if (!res.ok) throw new Error("Dirección no encontrada");
            return res.json();
        })
        .then(data => {
            const lat = data.lat;
            const lng = data.lng;

            // Eliminar marcador anterior si existe
            if (marcador) {
                map.removeLayer(marcador);
            }

            marcador = L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 15);
        })
        .catch(error => {
            alert("Error: " + error.message);
        });
}
</script>

{% endblock %}
