{% extends "base.html" %}

{% block contenido %}

<h2 class="mb-3">Enviar Notificación</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <input class="form-control mb-2"
           name="titulo"
           placeholder="Título del aviso"
           required>

    <textarea class="form-control mb-2"
              name="mensaje"
              placeholder="Mensaje (ej: corte de agua, pipas, etc.)"
              required></textarea>

    <!-- Municipio -->
    <select name="municipio" class="form-control mb-2">
        <option value="garcia">García</option>
    </select>

    <!-- Colonias -->
    <label class="form-label">Selecciona una o varias colonias:</label>
    <select name="colonias[]" class="form-control mb-3" multiple size="6" required>
        <option value="todas">Todas las colonias</option>
        {% for c in colonias %}
            <option value="{{ c[0] }}">{{ c[0] }}</option>
        {% endfor %}
    </select>

    <small class="text-muted">
        Puedes seleccionar varias usando Ctrl 
    </small>

    <button class="btn btn-danger w-100 mt-3">
        🚨 Enviar Notificación
    </button>

</form>

<br>

<a href="/admin" class="btn btn-secondary">⬅ Volver</a>

{% endblock %}
